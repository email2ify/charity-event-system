{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<h2>Event Registration</h2>

<form method="POST">

    <label for="name">Full Name</label>

    <input
        type="text"
        id="name"
        name="name"
        value="{{ name | default('') }}"
        minlength="2"
        maxlength="100"
        autocomplete="name"
        required>

    <label for="email">Email Address</label>

    <input
        type="email"
        id="email"
        name="email"
        value="{{ email | default('') }}"
        maxlength="100"
        autocomplete="email"
        required>

    <label for="phone">Phone Number</label>

    <input
        type="tel"
        id="phone"
        name="phone"
        value="{{ phone | default('') }}"
        minlength="7"
        maxlength="20"
        autocomplete="tel"
        required>

    <button
        type="submit"
        class="btn btn-register">

        Register

    </button>

</form>

{% endblock %}
