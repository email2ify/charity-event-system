{% extends "base.html" %}

{% block content %}

<h2>Edit Registration</h2>

<form method="POST">

    <label for="name">Full Name</label><br>
    <input
        type="text"
        id="name"
        name="name"
        value="{{ registration['participant_name'] }}"
        required>

    <br><br>

    <label for="email">Email Address</label><br>
    <input
        type="email"
        id="email"
        name="email"
        value="{{ registration['email'] }}"
        required>

    <br><br>

    <label for="phone">Phone Number</label><br>
    <input
        type="text"
        id="phone"
        name="phone"
        value="{{ registration['phone'] }}"
        required>

    <br><br>

    <button type="submit">
        Update Registration
    </button>

</form>

<br>

<a href="/participants">
    ← Back to Participants
</a>

{% endblock %}
