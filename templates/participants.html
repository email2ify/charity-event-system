{% extends "base.html" %}

{% block content %}

<h2>Registered Participants</h2>

<table>

    <thead>

        <tr>

            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Actions</th>

        </tr>

    </thead>

    <tbody>

    {% for participant in participants %}

        <tr>

            <td>{{ participant["participant_name"] }}</td>
            <td>{{ participant["email"] }}</td>
            <td>{{ participant["phone"] }}</td>

            <td>

                <a href="/registration/{{ participant['registration_id'] }}">
                    View
                </a>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

<br>

<a href="/register">
    <button>Register Another Participant</button>
</a>

{% endblock %}
